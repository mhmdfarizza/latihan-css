<html>
    <head>
        <body>
            <hr>
            <h1><u>Lesson 8 Exercises - Display Block and Inline-Block</u></h1>
            <hr>
            <h1>8.a</h1>
            <br>
            <input type="text" placeholder="Name" class="blok">
            <input type="text" placeholder="Email">
            <style>
                .blok {
                    display: block;
                }
            </style>
            <hr>
            <h1>8.b</h1>
            <strong><h2 class="text">Thanks for chatting with our<br>customer supporting. would you<br>like to take our quick survey?</h2></strong>
            <button class="inline">Yes</button><button class="inline">No</button>
            <br><hr>
            <style>
                .text {
                    width: 350px;
                    vertical-align: middle;
                    display: inline-block;
                }
                .inline {
                    display: inline-block;
                    vertical-align: middle;
                    width: 45;
                    height: 30;
                    font-size: medium;
                }
            </style>

            <h1>8.c</h1>
            <center><img src="7a.jpg" alt="8.c" class="image"></center>
            <br>
            <style>
                .image {
                    width: 200px;
                    height: 120px;
                }
            </style>
            <center><input type="text" placeholder=" Search Google or type a URL" class="lima"></center>
            <br><br><hr>
            <style>
                .lima {
                    border-radius: 50px;
                    width: 300px;
                    height: 30px;
                    border: transparent;
                    box-shadow: 0 0px 5px gray;
                }
            </style>

            <font color="red" size="5" face="arial"><strong><u>Challange Exercises</u></strong></font>
        </body>
    </head>
